name: 🚀 Deploy Chinook Music Store

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    name: 🐍 Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Deploy a EC2 Backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Parcial_BigData_Corte1
            git pull origin main
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart chinook-backend
            sleep 3
            sudo systemctl status chinook-backend --no-pager

  deploy-frontend:
    name: ⚛️ Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Deploy a EC2 Frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Parcial_BigData_Corte1/frontend
            git pull origin main
            npm install -q
            npm run build
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html/
            sudo systemctl restart nginx
            echo "✅ Frontend desplegado!"
